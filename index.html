<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sahara Flash LiveScore</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <h1>Sahara Flash</h1>
    <p>Loading live matches...</p>
</div>

<header>

    <div class="logo">
        <h1>Sahara <span>Flash</span></h1>
        <p>Live Football Scores</p>
    </div>

    <nav>
        <ul>
            <li onclick="showSection('live')">Live</li>
            <li onclick="showSection('fixtures')">Fixtures</li>
            <li onclick="showSection('standings')">Standings</li>
            <li onclick="showSection('news')">News</li>
        </ul>
    </nav>

    <div class="search">
        <input type="text" id="searchInput" placeholder="Search teams..." onkeyup="searchTeams()">
    </div>

</header>

<main>

    <!-- LIVE -->
    <section id="live-section" class="section active">
        <h2 class="section-title">Live Matches</h2>
        <div id="live-matches" class="matches-grid">
            <p>Loading live matches...</p>
        </div>
    </section>

    <!-- FIXTURES -->
    <section id="fixtures-section" class="section">
        <h2 class="section-title">Upcoming Fixtures</h2>
        <div id="fixtures" class="matches-grid"></div>
    </section>

    <!-- STANDINGS -->
    <section id="standings-section" class="section">
        <h2 class="section-title">League Standings</h2>

        <select id="league-select" onchange="loadStandings()"></select>

        <table id="standings-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </section>

    <!-- NEWS -->
    <section id="news-section" class="section">
        <h2 class="section-title">Football News</h2>
        <div id="news-content">
            <p>Latest football news loading...</p>
        </div>
    </section>

</main>

<!-- MODAL -->
<div id="team-modal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">×</span>

        <div id="modal-team-header"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Live</button>
            <button class="tab-btn" onclick="switchTab(1)">Lineup</button>
            <button class="tab-btn" onclick="switchTab(2)">Stats</button>
            <button class="tab-btn" onclick="switchTab(3)">Events</button>
            <button class="tab-btn" onclick="switchTab(4)">Odds</button>
            <button class="tab-btn" onclick="switchTab(5)">Preview</button>
        </div>

        <div id="tab-video" class="tab-content active">
            <iframe id="live-video" width="100%" height="500" allowfullscreen></iframe>
        </div>

        <div id="tab-lineup" class="tab-content">
            <div id="lineup-content"></div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div id="stats-content"></div>
        </div>

        <div id="tab-events" class="tab-content">
            <div id="events-content"></div>
        </div>

        <div id="tab-odds" class="tab-content">
            <div id="odds-content"></div>
        </div>

        <div id="tab-preview" class="tab-content">
            <div id="preview-content"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

<!-- FIX STARTUP -->
<script>
window.onload = function () {

    setTimeout(() => {
        const splash = document.getElementById("splash");
        if (splash) splash.style.display = "none";
    }, 2500);

    if (typeof loadLiveMatches === "function") {
        loadLiveMatches();
    }
};
</script>

</body>
</html>
